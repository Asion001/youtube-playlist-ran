<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"
    aria-labelledby="title desc">
    <title id="title">Playlist Ranker</title>
    <desc id="desc">Find the best video in your YouTube playlist through pairwise comparison.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#60a5fa" />
        </linearGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)" />
    <circle cx="1050" cy="140" r="180" fill="#22d3ee" opacity="0.08" />
    <circle cx="180" cy="560" r="230" fill="#60a5fa" opacity="0.08" />

    <g transform="translate(120 180)">
        <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#accent)" />
        <path d="M27 22v28l24-14-24-14z" fill="#0b1220" />

        <text x="96" y="46" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700">
            Playlist Ranker
        </text>

        <text x="0" y="138" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">
            Find the best video in your YouTube playlist
        </text>

        <text x="0" y="184" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="28">
            Rank videos with fast A/B pairwise comparisons
        </text>

        <g transform="translate(0 250)">
            <rect x="0" y="0" width="300" height="72" rx="14" fill="#0b1220" stroke="#1f2937" />
            <text x="28" y="46" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="28"
                font-weight="700">A</text>
            <text x="76" y="46" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">Video A</text>

            <text x="332" y="46" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="26"
                font-weight="700">vs</text>

            <rect x="400" y="0" width="300" height="72" rx="14" fill="#0b1220" stroke="#1f2937" />
            <text x="428" y="46" fill="#60a5fa" font-family="Inter, Arial, sans-serif" font-size="28"
                font-weight="700">B</text>
            <text x="476" y="46" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="24">Video B</text>
        </g>
    </g>

</svg>